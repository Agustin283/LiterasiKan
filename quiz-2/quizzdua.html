<!DOCTYPE html>
<html lang="en">
  <head>
    <style>
      #timer {
        font-size: 24px;
        font-weight: bold;
        color: #ff0000; /* Warna merah */
        margin-bottom: 20px;
      }
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-image: url(https://i.pinimg.com/736x/e6/04/83/e60483df64f74fa2bf2d3966105302b6.jpg);
        color: #4335a7; /* Warna ungu gelap */
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      #quiz {
        width: 100%;
        max-width: 600px;
        text-align: center;
      }

      .quiz-header h1,
      .quiz-header h2 {
        color: #4335a7; /* Warna ungu gelap */
        margin: 10px 0;
      }

      #game {
        padding: 20px;
        background-color: #fff6e9; /* Warna krem terang */
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); /* Bayangan lebih ringan */
      }

      #question {
        font-size: 20px;
        margin-bottom: 20px;
        color: #4335a7; /* Warna ungu gelap */
      }

      .choices {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .choices button {
        padding: 10px;
        background-color: #ff7f3e; /* Warna oranye cerah */
        color: #fff6e9; /* Teks warna krem terang */
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        transition: background-color 0.3s;
      }

      .choices button:hover {
        background-color: #e66a2f; /* Warna oranye sedikit lebih gelap */
      }

      #scoreText {
        margin-top: 20px;
        font-size: 24px;
        font-weight: bold;
        color: #4335a7;
      }

      .choices button {
        text-align: left;
        display: flex;
        align-items: center;
        padding: 10px 20px;
        gap: 10px;
      }

      .choices span {
        font-weight: bold;
        color: #fff6e9;
      }
    </style>
  </head>

  <body>
    <section id="quiz">
      <div id="loader" class="container">
        <div class="quiz-header">
          <h2 class="section-title">Ayo Kuis</h2>
          <style>
            .section-title {
              display: inline-block;
              padding: 10px;
              background-color: #fff6e9;
              border-radius: 8px;
            }

            .section-title span {
              font-size: 20px;
              font-weight: bold;
            }
          </style>
        </div>
        <div id="game" class="quiz-content hidden">
          <div id="timer">00:20</div>
          <div id="question">Question will appear here</div>

          <div class="choices">
            <button data-number="1">
              <span class="choice-label">A.</span>
              <span class="choice-text">Choice 1</span>
            </button>
            <button data-number="1">
              <span class="choice-label">A.</span>
              <span class="choice-text">Choice 1</span>
            </button>
            <button data-number="1">
              <span class="choice-label">A.</span>
              <span class="choice-text">Choice 1</span>
            </button>
            <button data-number="1">
              <span class="choice-label">A.</span>
              <span class="choice-text">Choice 1</span>
            </button>
          </div>

          <!-- Menampilkan skor -->
          <div id="scoreText">0</div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="quiz-2.js"></script>
    <script>
      let timerInterval;
      const timerElement = document.getElementById("timer");
      let timeLeft = 20;

      function formatTime(seconds) {
        const minutes = Math.floor(seconds / 60);
        const remainingSeconds = seconds % 60;
        return `${String(minutes).padStart(2, "0")}:${String(
          remainingSeconds
        ).padStart(2, "0")}`;
      }

      function startTimer(nextQuestionCallback) {
        timeLeft = 20;
        timerElement.textContent = formatTime(timeLeft);

        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
          timeLeft--;
          timerElement.textContent = formatTime(timeLeft);

          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            nextQuestionCallback();
          }
        }, 1000);
      }

      function nextQuestion() {
        console.log("Lanjut ke pertanyaan berikutnya!");
        startTimer(nextQuestion);
      }

      startTimer(nextQuestion);
    </script>
  </body>
</html>
